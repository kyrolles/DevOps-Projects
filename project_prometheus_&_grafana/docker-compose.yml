services:
  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - /home/kyrl/DevOps-Projects/project_prometheus_1:/etc/prometheus
    depends_on:
    - alertmanager

  alertmanager:
    image: quay.io/prometheus/alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - ./bot_token.txt:/etc/alertmanager/bot_token.txt
      - ./auth_e.txt:/etc/alertmanager/auth_e.txt

  grafana:
    image: grafana/grafana:12.4.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=kok
      - GF_SECURITY_ADMIN_PASSWORD=kok1234
    volumes:
      - grafana-storage:/var/lib/grafana
    depends_on:
    - prometheus




volumes:
  grafana-storage: {}
